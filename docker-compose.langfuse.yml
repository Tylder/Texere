# Minimal Langfuse Local Development Setup
# Uses only PostgreSQL for simplicity and ease of iteration
#
# Usage:
#   docker compose -f docker-compose.langfuse.yml up
#
# Then open http://localhost:3000 in your browser

services:
  # PostgreSQL: Database for everything (no ClickHouse, Redis, MinIO needed locally)
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    ports:
      - "5432:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Langfuse: Web UI and API
  # Simplified setup for local development
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      
      # Auth
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      
      # Disable optional features for local dev
      # (ClickHouse, Redis, S3 can be added later if needed)
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  langfuse_postgres_data:
