# Local multi-model LLM endpoint (Ollama with OpenAI-compatible API)
#
# Usage:
#   docker compose -f docker-compose.ollama.yml up -d
#   docker compose -f docker-compose.ollama.yml exec ollama ollama pull qwen2.5:7b-instruct-q4_0
#   docker compose -f docker-compose.ollama.yml exec ollama ollama pull llama3.2:3b-instruct
#
# API:
#   OpenAI-compatible base URL: http://localhost:11434/v1
#   Supports switching models at runtime via `model` in the OpenAI request.

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - '11434:11434'
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_ORIGINS: '*'
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_models:
